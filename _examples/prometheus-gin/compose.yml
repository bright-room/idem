services:
  app:
    build:
      context: ../..
      dockerfile: _examples/prometheus-gin/Dockerfile
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v3.10.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      app:
        condition: service_started
