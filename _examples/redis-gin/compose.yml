services:
  app-1:
    build:
      context: ../..
      dockerfile: _examples/redis-gin/Dockerfile
    ports:
      - "8081:8080"
    environment:
      REDIS_ADDR: redis:6379
      HOSTNAME: app-1
    depends_on:
      redis:
        condition: service_started

  app-2:
    build:
      context: ../..
      dockerfile: _examples/redis-gin/Dockerfile
    ports:
      - "8082:8080"
    environment:
      REDIS_ADDR: redis:6379
      HOSTNAME: app-2
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:8-alpine
