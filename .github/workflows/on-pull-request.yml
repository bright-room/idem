name: on-pull-request

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run unit tests
        run: |
          gotestsum \
            --junitfile unit-test-report.xml \
            --format testdox \
            -- -short -coverprofile=coverage.out ./...

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Unit Test Report
          path: unit-test-report.xml
          reporter: java-junit

      - name: Coverage Report
        uses: k1LoW/octocov-action@v1
        if: always()

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Start Redis Cluster
        run: |
          for port in 7000 7001 7002; do
            docker run -d --name redis-cluster-$port --network host \
              redis:8-alpine redis-server \
              --cluster-enabled yes \
              --cluster-config-file nodes.conf \
              --port $port \
              --bind 0.0.0.0 \
              --cluster-node-timeout 5000 \
              --appendonly yes
          done

          for port in 7000 7001 7002; do
            for i in $(seq 1 30); do
              if docker exec redis-cluster-$port redis-cli -p $port ping 2>/dev/null | grep -q PONG; then
                break
              fi
              sleep 1
            done
          done

          docker exec redis-cluster-7000 redis-cli --cluster create \
            127.0.0.1:7000 127.0.0.1:7001 127.0.0.1:7002 \
            --cluster-replicas 0 --cluster-yes

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run integration tests
        env:
          REDIS_CLUSTER_ADDRS: "localhost:7000,localhost:7001,localhost:7002"
        run: |
          gotestsum \
            --junitfile integration-test-report.xml \
            --format testdox \
            -- -run Integration -count=1 -coverprofile=coverage-integration.out ./...

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Integration Test Report
          path: integration-test-report.xml
          reporter: java-junit

      - name: Coverage Report
        uses: k1LoW/octocov-action@v1
        if: always()
        with:
          config: .octocov.integration.yml
