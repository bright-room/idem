name: on-pull-request

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run unit tests
        run: |
          gotestsum \
            --junitfile unit-test-report.xml \
            --format testdox \
            -- -short -coverprofile=coverage.out ./...

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Unit Test Report
          path: unit-test-report.xml
          reporter: java-junit

      - name: Coverage Report
        uses: k1LoW/octocov-action@v1
        if: always()

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run integration tests
        run: |
          gotestsum \
            --junitfile integration-test-report.xml \
            --format testdox \
            -- -run Integration -count=1 -coverprofile=coverage-integration.out ./...

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Integration Test Report
          path: integration-test-report.xml
          reporter: java-junit

      - name: Coverage Report
        uses: k1LoW/octocov-action@v1
        if: always()
        with:
          config: .octocov.integration.yml
